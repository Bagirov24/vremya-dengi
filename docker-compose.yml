version: '3.9'

services:

  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: vd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vremya_dengi}
      POSTGRES_USER: ${POSTGRES_USER:-vd_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vd_password}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-vd_user} -d ${POSTGRES_DB:-vremya_dengi}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vd_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (FastAPI) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vd_backend
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Celery Worker ────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vd_celery_worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker -l info -Q default,periodic -c 2

  # ─── Celery Beat ──────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vd_celery_beat
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ─── Frontend (Next.js) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vd_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

  # ─── Stripe CLI (dev only) ─────────────────────────────────────
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: vd_stripe_cli
    command: listen --forward-to backend:8000/api/v1/billing/webhook --skip-verify
    env_file: .env
    depends_on:
      - backend
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: vd_network
