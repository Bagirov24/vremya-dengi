version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: vd_redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vd_backend
    ports:
      - '8000:8000'
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vd_celery_worker
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker -l info -Q default,periodic -c 2

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vd_celery_beat
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app beat -l info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vd_frontend
    ports:
      - '3000:3000'
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: vd_stripe_cli
    command: listen --forward-to backend:8000/api/webhooks/stripe --skip-verify
    env_file: .env
    depends_on:
      - backend
    profiles:
      - dev

volumes:
  redis_data:
