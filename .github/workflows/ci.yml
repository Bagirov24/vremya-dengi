name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          cd backend
          pip install -r requirements.txt
          pip install flake8 black
      - name: Lint
        run: |
          cd backend
          flake8 app/ --max-line-length=120
          black --check app/

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: |
          cd frontend
          npm install
      - name: Lint
        run: |
          cd frontend
          npm run lint

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker compose build
      - name: Test containers start
        run: |
          docker compose up -d
          sleep 10
          curl -f http://localhost:8000/api/health || exit 1
          docker compose down
